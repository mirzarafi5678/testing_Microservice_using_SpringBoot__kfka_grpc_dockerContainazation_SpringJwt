spring.application.name=patientService

spring.datasource.url=jdbc:postgresql://localhost:5432/microservice
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=admin_viewer
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

# Spring Security Configuration


# Disable JPA open in view warning
spring.jpa.open-in-view=false
logging.level.root=info
logging.level.com.example23.demo.exception=DEBUG
server.port=41111
# Kafka
spring.kafka.bootstrap-servers=kafka:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

# Consumer
spring.kafka.consumer.group-id=patient-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer