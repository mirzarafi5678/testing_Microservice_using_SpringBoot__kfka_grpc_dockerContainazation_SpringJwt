
services:



  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - own-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    networks:
      - own-network
  billing-service:
    build:
      context: ../billingService
      dockerfile: Dockerfile
    container_name: billing-service
    ports:
      - "4001:4001"
      - "9001:9001"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 4001
      GRPC_SERVER_PORT: 9001
    networks:
      - own-network

  auth-service:
    build:
      context: ../Auth-Service
      dockerfile: DockerFile1

    container_name: auth-service
#    ports:
#      - "41112:41112"
    environment:
      JWT_SECRET :  38219bc8aba2437edb2d99c0b7bc0a63a8731b5d11c80abeee9fc0e53e7fd06d
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-db:3306/AuthInfo
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
    depends_on:
      - auth-db
    networks:
      - own-network


  patient-service-db:
    image: postgres:16-alpine
    container_name: patient-service-db
    environment:

      POSTGRES_DB: microservice
      POSTGRES_USER: admin_viewer
      POSTGRES_PASSWORD: password
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_viewer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - own-network

  analytic-service:
    build:
      context: ../AnalyticService
      dockerfile: DockerFile
    container_name: Anlyticervice
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "4002:4002"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 4002
    networks:
      - own-network
  api-gateway-service:
    container_name: api-gateway
#    depends_on:
#      patient-service:
#        condition: service_healthy
    environment:
      AUTH_SERVICE_URL: http://auth-service:41112


    build:
      context: ../api-gateway
      dockerfile: DockerFile1
    ports:
      - "4004:4004"
    depends_on: # 👈 add this
      patient-service:
        condition: service_started
    networks:
      - own-network
  auth-db:
    image: mysql:8
    container_name: auth-db
    environment:
      MYSQL_DATABASE: AuthInfo
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_pass
    ports:
      - "3311:3306"
    networks:
      - own-network
    volumes:
      - auth_db_data:/var/lib/mysql
  patient-service:
    build:
      context: .
      dockerfile: DockerFile1
    container_name: patient-service
    depends_on:
      kafka:
        condition: service_started
      patient-service-db:
        condition: service_healthy
      billing-service:
        condition: service_started
#    ports:
#      - "41111:41111"
    environment:
      SERVER_PORT: 41111
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-service-db:5432/microservice
      SPRING_DATASOURCE_USERNAME: admin_viewer
      SPRING_DATASOURCE_PASSWORD: password

      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9001
    networks:
      - own-network

volumes:
  postgres_data:
  auth_db_data:

networks:
  own-network:
    driver: bridge


